name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  edge-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/edge-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -c "import main; print(main.app.title)"

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build edge image
        run: docker build -t aetherops-edge:ci ./services/edge-gateway
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: aetherops-edge:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
