apiVersion: apps/v1
kind: Deployment
metadata:
  name: aetherops-edge-gateway
  namespace: aetherops
  labels:
    app: aetherops-edge-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aetherops-edge-gateway
  template:
    metadata:
      labels:
        app: aetherops-edge-gateway
    spec:
      containers:
        - name: edge-gateway
          image: aetherops/edge-gateway:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aetherops-edge-gateway
  namespace: aetherops
  labels:
    app: aetherops-edge-gateway
spec:
  selector:
    app: aetherops-edge-gateway
  ports:
    - port: 8080
      targetPort: 8080
      name: http
