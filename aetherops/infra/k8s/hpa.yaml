apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aetherops-edge-gateway
  namespace: aetherops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aetherops-edge-gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
