apiVersion: apps/v1
kind: Deployment
metadata:
  name: aetherops-web
  namespace: aetherops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aetherops-web
  template:
    metadata:
      labels:
        app: aetherops-web
    spec:
      containers:
        - name: web
          image: aetherops/web:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aetherops-web
  namespace: aetherops
spec:
  selector:
    app: aetherops-web
  ports:
    - port: 80
      targetPort: 80
      name: http
